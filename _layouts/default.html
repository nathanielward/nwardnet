		    @import url(https://fonts.googleapis.com/css?family=Merriweather:400,700);

			/* Practical Typography-inspired defaults:
*/

:root {
  /* Responsive base size in the recommended range */
  --text-size: clamp(16px, 1.2vw + 14px, 21px);
  --line: 1.4;          /* 140% ≈ within 120–145% */
  --measure: 65ch;      /* tends to land inside 45–90 chars for typical serif body */
  --gap: 0.85em;        /* paragraph spacing (pick this OR indents) */
}

body {
  font-family: Charter, "Source Serif", "Times New Roman", Times, serif;
  font-size: var(--text-size);
  line-height: var(--line);
  font-kerning: normal;
  font-feature-settings: "kern" 1, "liga" 1;
  text-rendering: optimizeLegibility;

  /* Keep lines from getting too long */
  max-width: var(--measure);
  margin: 0 auto;
  padding: clamp(16px, 3vw, 32px);

  /* Default to left-aligned (avoids needing justified-text hyphenation rules) */
  text-align: left;
  hyphens: auto;
	color: #222;
}

p {
  margin: 0 0 var(--gap) 0;
}

/* Headings: space does most of the work; bold is optional but effective */
h1, h2 {
  font-weight: 700;
  line-height: 1.15;
  margin: 1.6em 0 0.5em;
}

h1 {
  font-size: clamp(2rem, 2.2vw + 1.4rem, 3rem);
  letter-spacing: -0.01em;
  font-style: italic;
}

h2 {
  font-size: clamp(1.4rem, 1.4vw + 1.1rem, 2rem);
}

/* Tighter “hug” between heading and its first paragraph */
h1 + p, h2 + p {
  margin-top: 0;
}
			a {
				color: #FF9000;
				}
	    </style>
	</head>
	<body>

	</body>
